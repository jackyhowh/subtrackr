<div class="p-6">
    <div class="flex items-center justify-between mb-6">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
            {{if .IsEdit}}{{t .Lang "form.edit_title"}}{{else}}{{t .Lang "form.add_title"}}{{end}}
        </h3>
        <button onclick="document.getElementById('modal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-gray-300 transition-colors duration-150">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>

    <div id="form-errors" class="mb-4"></div>

    <form {{if .IsEdit}}hx-put="/api/subscriptions/{{.Subscription.ID}}"{{else}}hx-post="/api/subscriptions"{{end}} 
          hx-target="#form-errors"
          hx-swap="innerHTML"
          hx-on::after-request="if(event.detail.successful) { if(event.detail.xhr.status === 201 || event.detail.xhr.status === 200) { window.location.reload(); } }">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Name -->
            <div class="md:col-span-2">
                <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">{{t .Lang "form.name"}} *</label>
                <input type="text" id="name" name="name" required
                       value="{{if .Subscription}}{{.Subscription.Name}}{{end}}"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">
            </div>

            <!-- Label (optional) -->
            <div class="md:col-span-2">
                <label for="label" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    {{t .Lang "form.label"}} <span class="text-gray-400 dark:text-gray-500 font-normal">({{t .Lang "common.optional"}})</span>
                </label>
                <input type="text" id="label" name="label" maxlength="120"
                       placeholder="{{t .Lang "form.label_placeholder"}}"
                       value="{{if .Subscription}}{{.Subscription.Label}}{{end}}"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">{{t .Lang "form.label_help"}}</p>
            </div>

            <!-- Tags (optional) -->
            <div class="md:col-span-2">
                <label for="tags" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    {{t .Lang "form.tags"}} <span class="text-gray-400 dark:text-gray-500 font-normal">({{t .Lang "form.tags_subtitle"}})</span>
                </label>
                <input type="text" id="tags" name="tags"
                       placeholder="{{t .Lang "form.tags_placeholder"}}"
                       value="{{if .TagsCSV}}{{.TagsCSV}}{{end}}"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">{{t .Lang "form.tags_help"}}</p>
            </div>

            <!-- Category -->
            <div>
                <label for="category_id" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">{{t .Lang "form.category"}} *</label>
                <div class="flex gap-2">
                    <div class="flex-1" id="category-select-container">
                        <select id="category_id" name="category_id" required
                                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">
                            <option value="">{{t .Lang "form.category"}}…</option>
                            {{range .Categories}}
                                <option value="{{.ID}}" {{if $.Subscription}}{{if eq $.Subscription.CategoryID .ID}}selected{{end}}{{end}}>{{.Name}}</option>
                            {{end}}
                        </select>
                    </div>
                    <button type="button" id="add-category-btn" onclick="showNewCategoryInput()"
                            class="px-3 py-2 text-sm font-medium text-primary bg-primary/10 border border-primary/30 rounded-lg hover:bg-primary/20 transition-colors duration-150"
                            title="{{t .Lang "form.add_category"}}">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                        </svg>
                    </button>
                </div>
                <!-- Inline new category input (hidden by default) -->
                <div id="new-category-container" class="hidden mt-2">
                    <div class="flex gap-2">
                        <input type="text" id="new-category-name" placeholder="{{t .Lang "form.new_category_placeholder"}}"
                               class="flex-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">
                        <button type="button" onclick="createNewCategory()"
                                class="px-3 py-2 text-sm font-medium text-white bg-primary rounded-lg hover:bg-primary/90 transition-colors duration-150">
                            {{t .Lang "form.add"}}
                        </button>
                        <button type="button" onclick="hideNewCategoryInput()"
                                class="px-3 py-2 text-sm font-medium text-gray-600 dark:text-gray-400 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors duration-150">
                            {{t .Lang "common.cancel"}}
                        </button>
                    </div>
                    <div id="new-category-error" class="text-sm text-danger mt-1 hidden"></div>
                </div>
            </div>

            <!-- Cost -->
            <div>
                <label for="cost" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">{{t .Lang "form.cost"}} *</label>
                <div class="relative">
                    <span class="absolute left-3 top-2 text-gray-500 dark:text-gray-400">{{.CurrencySymbol}}</span>
                    <input type="number" id="cost" name="cost" step="0.01" min="0" required
                           value="{{if .Subscription}}{{.Subscription.Cost}}{{end}}"
                           class="w-full pl-8 pr-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">
                </div>
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">{{t .Lang "form.cost_help"}}</p>
            </div>

            <!-- Share Count -->
            <div>
                <label for="share_count" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    {{t .Lang "form.shared_with"}} <span class="text-gray-400 dark:text-gray-500 font-normal">({{t .Lang "form.shared_with_subtitle"}})</span>
                </label>
                <input type="number" id="share_count" name="share_count" min="1" step="1"
                       value="{{if .Subscription}}{{if .Subscription.ShareCount}}{{.Subscription.ShareCount}}{{else}}1{{end}}{{else}}1{{end}}"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">{{t .Lang "form.shared_with_help"}}</p>
            </div>

            <!-- Original Currency -->
            <div>
                <label for="original_currency" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">{{t .Lang "form.currency"}} *</label>
                <select id="original_currency" name="original_currency" required
                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">
                    {{range .Currencies}}
                    <option value="{{.Code}}" {{if $.Subscription}}{{if eq $.Subscription.OriginalCurrency .Code}}selected{{end}}{{else}}{{if eq .Code "USD"}}selected{{end}}{{end}}>{{.Symbol}} {{.Code}}</option>
                    {{end}}
                </select>
            </div>

            <!-- Schedule -->
            <div>
                <label for="schedule_combo" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">{{t .Lang "form.schedule"}} *</label>
                <select id="schedule_combo" required
                        onchange="updateScheduleFields()"
                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">
                    <option value="">{{t .Lang "form.schedule_select"}}</option>
                    <optgroup label="Common">
                        <option value="Daily_1">{{t .Lang "schedule.daily"}}</option>
                        <option value="Weekly_1">{{t .Lang "schedule.weekly"}}</option>
                        <option value="Weekly_2">{{printf (t .Lang "schedule.every_n_weeks") 2}}</option>
                        <option value="Monthly_1">{{t .Lang "schedule.monthly"}}</option>
                        <option value="Monthly_2">{{printf (t .Lang "schedule.every_n_months") 2}}</option>
                        <option value="Quarterly_1">{{t .Lang "schedule.quarterly"}}</option>
                        <option value="Monthly_6">{{printf (t .Lang "schedule.every_n_months") 6}}</option>
                        <option value="Annual_1">{{t .Lang "schedule.annual"}}</option>
                    </optgroup>
                    <optgroup label="Multi-Year">
                        <option value="Annual_2">{{printf (t .Lang "schedule.every_n_years") 2}}</option>
                        <option value="Annual_3">{{printf (t .Lang "schedule.every_n_years") 3}}</option>
                        <option value="Annual_5">{{printf (t .Lang "schedule.every_n_years") 5}}</option>
                        <option value="Annual_10">{{printf (t .Lang "schedule.every_n_years") 10}}</option>
                    </optgroup>
                </select>
                <input type="hidden" id="schedule" name="schedule" value="{{if .Subscription}}{{.Subscription.Schedule}}{{end}}">
                <input type="hidden" id="schedule_interval" name="schedule_interval" value="{{if .Subscription}}{{.Subscription.ScheduleInterval}}{{else}}1{{end}}">
            </div>

            <!-- Status -->
            <div>
                <label for="status" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">{{t .Lang "form.status"}} *</label>
                <select id="status" name="status" required
                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">
                    <option value="">{{t .Lang "form.status"}}…</option>
                    <option value="Active" {{if .Subscription}}{{if eq .Subscription.Status "Active"}}selected{{end}}{{end}}>{{t .Lang "form.status_active"}}</option>
                    <option value="Cancelled" {{if .Subscription}}{{if eq .Subscription.Status "Cancelled"}}selected{{end}}{{end}}>{{t .Lang "form.status_cancelled"}}</option>
                    <option value="Paused" {{if .Subscription}}{{if eq .Subscription.Status "Paused"}}selected{{end}}{{end}}>{{t .Lang "form.status_paused"}}</option>
                    <option value="Trial" {{if .Subscription}}{{if eq .Subscription.Status "Trial"}}selected{{end}}{{end}}>{{t .Lang "form.status_trial"}}</option>
                </select>
            </div>

            <!-- Payment Method -->
            <div>
                <label for="payment_method" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">{{t .Lang "form.payment_method"}}</label>
                <input type="text" id="payment_method" name="payment_method"
                       value="{{if .Subscription}}{{.Subscription.PaymentMethod}}{{end}}"
                       placeholder="e.g., Visa ****1234"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">
            </div>

            <!-- Account -->
            <div>
                <label for="account" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">{{t .Lang "form.account"}}</label>
                <input type="text" id="account" name="account"
                       value="{{if .Subscription}}{{.Subscription.Account}}{{end}}"
                       placeholder="Account email or username"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">
            </div>

            <!-- URL -->
            <div class="md:col-span-2">
                <label for="url" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">{{t .Lang "form.url"}}</label>
                <input type="url" id="url" name="url"
                       value="{{if .Subscription}}{{.Subscription.URL}}{{end}}"
                       placeholder="https://example.com"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">
            </div>

            <!-- Start Date -->
            <div>
                <label for="start_date" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">{{t .Lang "form.start_date"}}</label>
                <input type="date" id="start_date" name="start_date"
                       value="{{if .Subscription}}{{if .Subscription.StartDate}}{{.Subscription.StartDate.Format "2006-01-02"}}{{end}}{{end}}"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">
            </div>

            <!-- Renewal Date -->
            <div>
                <label for="renewal_date" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                    <span class="flex items-center">
                        {{t .Lang "form.renewal_date"}}
                        <div class="relative group ml-1">
                            <svg class="w-4 h-4 text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-400 cursor-help" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <div class="absolute left-0 bottom-full mb-2 hidden group-hover:block z-10 w-56">
                                <div class="bg-gray-900 dark:bg-gray-800 text-white text-xs rounded-lg py-2 px-3 shadow-lg">
                                    Renewal date will automatically update after you click Update
                                    <div class="absolute left-2 top-full -mt-1">
                                        <div class="border-4 border-transparent border-t-gray-900 dark:border-t-gray-800"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </span>
                </label>
                <input type="date" id="renewal_date" name="renewal_date"
                       value="{{if .Subscription}}{{if .Subscription.RenewalDate}}{{.Subscription.RenewalDate.Format "2006-01-02"}}{{end}}{{end}}"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">
            </div>

            <!-- Cancellation Date -->
            <div>
                <label for="cancellation_date" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">{{t .Lang "form.cancellation_date"}}</label>
                <input type="date" id="cancellation_date" name="cancellation_date"
                       value="{{if .Subscription}}{{if .Subscription.CancellationDate}}{{.Subscription.CancellationDate.Format "2006-01-02"}}{{end}}{{end}}"
                       class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">
            </div>

            <!-- Usage -->
            <div>
                <label for="usage" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">{{t .Lang "form.usage"}}</label>
                <select id="usage" name="usage"
                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">
                    <option value="">{{t .Lang "form.usage"}}…</option>
                    <option value="High" {{if .Subscription}}{{if eq .Subscription.Usage "High"}}selected{{end}}{{end}}>{{t .Lang "form.usage_high"}}</option>
                    <option value="Medium" {{if .Subscription}}{{if eq .Subscription.Usage "Medium"}}selected{{end}}{{end}}>{{t .Lang "form.usage_medium"}}</option>
                    <option value="Low" {{if .Subscription}}{{if eq .Subscription.Usage "Low"}}selected{{end}}{{end}}>{{t .Lang "form.usage_low"}}</option>
                    <option value="None" {{if .Subscription}}{{if eq .Subscription.Usage "None"}}selected{{end}}{{end}}>{{t .Lang "form.usage_none"}}</option>
                </select>
            </div>

            <!-- Notes -->
            <div class="md:col-span-2">
                <label for="notes" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">{{t .Lang "form.notes"}}</label>
                <textarea id="notes" name="notes" rows="3"
                          placeholder="Additional notes about this subscription"
                          class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 transition-colors duration-150">{{if .Subscription}}{{.Subscription.Notes}}{{end}}</textarea>
            </div>

            <!-- Reminder Toggle -->
            <div class="md:col-span-2">
                <label class="flex items-center space-x-3 cursor-pointer">
                    <input type="hidden" name="reminder_enabled" value="false">
                    <input type="checkbox" name="reminder_enabled" value="true"
                           {{if .IsEdit}}{{if .Subscription.ReminderEnabled}}checked{{end}}{{else}}checked{{end}}
                           class="w-4 h-4 text-primary bg-white dark:bg-gray-700 border-gray-300 dark:border-gray-600 rounded focus:ring-primary focus:ring-2 transition-colors duration-150">
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-300">{{t .Lang "form.reminder_enabled"}}</span>
                </label>
                <p class="mt-1 text-xs text-gray-500 dark:text-gray-400 ml-7">{{t .Lang "form.reminder_enabled_help"}}</p>
            </div>
        </div>

        <div class="flex justify-end space-x-3 mt-6 pt-6 border-t border-gray-200 dark:border-gray-700">
            <button type="button" onclick="document.getElementById('modal').classList.add('hidden')"
                    class="px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors duration-150">
                {{t .Lang "common.cancel"}}
            </button>
            <button type="submit"
                    class="px-4 py-2 text-sm font-medium text-white bg-primary border border-transparent rounded-lg hover:bg-primary/90 dark:bg-primary dark:hover:bg-primary/80 transition-colors duration-150">
                {{if .IsEdit}}{{t .Lang "common.save"}}{{else}}{{t .Lang "form.add"}}{{end}}
            </button>
        </div>
    </form>
</div>

<script>
// Inline category creation functions
function showNewCategoryInput() {
    document.getElementById('new-category-container').classList.remove('hidden');
    document.getElementById('add-category-btn').classList.add('hidden');
    document.getElementById('new-category-name').focus();
}

function hideNewCategoryInput() {
    document.getElementById('new-category-container').classList.add('hidden');
    document.getElementById('add-category-btn').classList.remove('hidden');
    document.getElementById('new-category-name').value = '';
    document.getElementById('new-category-error').classList.add('hidden');
}

let isCreatingCategory = false;

async function createNewCategory() {
    // Prevent double-submission
    if (isCreatingCategory) return;

    const nameInput = document.getElementById('new-category-name');
    const errorDiv = document.getElementById('new-category-error');
    const addBtn = document.querySelector('#new-category-container button');
    const name = nameInput.value.trim();

    if (!name) {
        errorDiv.textContent = 'Please enter a category name';
        errorDiv.classList.remove('hidden');
        return;
    }

    isCreatingCategory = true;
    if (addBtn) addBtn.disabled = true;

    try {
        const response = await fetch('/api/categories', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ name: name }),
        });

        if (!response.ok) {
            const data = await response.json();
            throw new Error(data.error || 'Failed to create category');
        }

        const newCategory = await response.json();

        // Validate response before adding
        if (!newCategory.id || !newCategory.name) {
            throw new Error('Invalid response from server');
        }

        // Add new option to dropdown and select it
        const select = document.getElementById('category_id');
        const option = document.createElement('option');
        option.value = newCategory.id;
        option.textContent = newCategory.name;
        option.selected = true;
        select.appendChild(option);

        // Hide the input and reset
        hideNewCategoryInput();
    } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.classList.remove('hidden');
    } finally {
        isCreatingCategory = false;
        if (addBtn) addBtn.disabled = false;
    }
}

// Allow Enter key to submit new category
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.activeElement.id === 'new-category-name') {
        e.preventDefault();
        createNewCategory();
    }
});

function updateScheduleFields() {
    const combo = document.getElementById('schedule_combo');
    const scheduleInput = document.getElementById('schedule');
    const intervalInput = document.getElementById('schedule_interval');
    if (!combo.value) return;
    const parts = combo.value.split('_');
    scheduleInput.value = parts[0];
    intervalInput.value = parts[1] || '1';
    calculateRenewalDate();
}

function initScheduleCombo() {
    const combo = document.getElementById('schedule_combo');
    const schedule = document.getElementById('schedule').value;
    const interval = (parseInt(document.getElementById('schedule_interval').value) || 1).toString();
    if (schedule) {
        const comboVal = schedule + '_' + interval;
        for (const opt of combo.options) {
            if (opt.value === comboVal) {
                opt.selected = true;
                break;
            }
        }
    }
}

function addMonths(date, months) {
    const d = new Date(date);
    const targetMonth = d.getMonth() + months;
    const targetYear = d.getFullYear() + Math.floor(targetMonth / 12);
    const normalizedMonth = ((targetMonth % 12) + 12) % 12;
    const lastDay = new Date(targetYear, normalizedMonth + 1, 0).getDate();
    const day = Math.min(d.getDate(), lastDay);
    return new Date(targetYear, normalizedMonth, day);
}

function calculateRenewalDate() {
    const schedule = document.getElementById('schedule').value;
    const interval = parseInt(document.getElementById('schedule_interval').value) || 1;
    const renewalDateInput = document.getElementById('renewal_date');
    if (!schedule) return;

    const today = new Date();
    let renewalDate;

    switch (schedule) {
        case 'Daily':
            renewalDate = new Date(today);
            renewalDate.setDate(today.getDate() + interval);
            break;
        case 'Weekly':
            renewalDate = new Date(today);
            renewalDate.setDate(today.getDate() + 7 * interval);
            break;
        case 'Monthly':
            renewalDate = addMonths(today, interval);
            break;
        case 'Quarterly':
            renewalDate = addMonths(today, 3 * interval);
            break;
        case 'Annual':
            renewalDate = new Date(today);
            renewalDate.setFullYear(today.getFullYear() + interval);
            break;
        default:
            return;
    }

    const year = renewalDate.getFullYear();
    const month = String(renewalDate.getMonth() + 1).padStart(2, '0');
    const day = String(renewalDate.getDate()).padStart(2, '0');
    renewalDateInput.value = `${year}-${month}-${day}`;
}

function initRenewalCalculator() {
    initScheduleCombo();
}

initRenewalCalculator();

// Also initialize on DOM content loaded as backup
document.addEventListener('DOMContentLoaded', initRenewalCalculator);
</script>
